# Serveur Minecraft jetable pour le benchmark RCON.
# Lancer :   docker compose up -d      (premier demarrage : ~1-2 min)
# Suivre :   docker compose logs -f    (attendre la ligne "RCON running")
# Arreter :  docker compose down       (ajouter -v pour supprimer le monde)
services:
  minecraft:
    image: itzg/minecraft-server
    environment:
      EULA: "TRUE"                    # acceptation des CGU Mojang (obligatoire)
      TYPE: "PAPER"                   # Paper = serveur optimise, compatible vanilla
      VERSION: "${MC_VERSION:-1.21.11}" # changer via: MC_VERSION=26.2 docker compose up -d
      LEVEL_TYPE: "minecraft:flat"    # monde plat : rien a generer, demarrage rapide
      MODE: "creative"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "queuecraft-spike"
      SPAWN_PROTECTION: "0"
      VIEW_DISTANCE: "6"
      MEMORY: "2G"
    ports:
      - "25565:25565"                 # port de jeu, pour te connecter et regarder
      - "127.0.0.1:25575:25575"       # RCON expose UNIQUEMENT en local (regle ADR D3)
    volumes:
      - ./data:/data
